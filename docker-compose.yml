# =====================================================================
# Smart Multi-Camera Retail Analytics System
#
# LITE mode (8 GB RAM laptops - default):
#   docker compose up -d postgres redis backend vision-worker frontend
#
# FULL mode (Kafka, MinIO, MLflow, Prometheus, Grafana, Celery):
#   docker compose --profile full up -d
# =====================================================================

name: retail-vision-analytics

services:
  # ------------------------------------------------------------ core
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retail_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-retail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retail_dev_password}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retail}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits: { memory: 512M }

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits: { memory: 320M }

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-retail}:${POSTGRES_PASSWORD:-retail_dev_password}@postgres:5432/${POSTGRES_DB:-retail_analytics}
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./configs:/app/configs:ro
      - ./datasets/samples:/app/datasets/samples:ro
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed_db &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits: { memory: 768M }

  vision-worker:
    build:
      context: .
      dockerfile: docker/vision.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-retail}:${POSTGRES_PASSWORD:-retail_dev_password}@postgres:5432/${POSTGRES_DB:-retail_analytics}
      REDIS_URL: redis://redis:6379/0
      BACKEND_URL: http://backend:8000
    depends_on:
      backend: { condition: service_healthy }
    volumes:
      - ./configs:/app/configs:ro
      - ./models:/app/models
      - ./datasets/samples:/app/datasets/samples:ro
    command: python -m streaming.camera_worker
    deploy:
      resources:
        limits: { memory: 2560M }
    # For NVIDIA GPU, uncomment:
    # gpus: all
    # and set DEVICE=cuda:0 in .env

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports: ["5173:80"]
    depends_on: [backend]
    deploy:
      resources:
        limits: { memory: 128M }

  # ------------------------------------------------------------ full profile
  celery-worker:
    profiles: ["full"]
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file: .env
    command: celery -A backend.app.services.celery_app worker -l info -c 2
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 512M }

  celery-beat:
    profiles: ["full"]
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file: .env
    command: celery -A backend.app.services.celery_app beat -l info
    depends_on:
      redis: { condition: service_healthy }

  kafka:
    profiles: ["full"]
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports: ["9092:9092"]
    deploy:
      resources:
        limits: { memory: 768M }

  minio:
    profiles: ["full"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio-data:/data]
    deploy:
      resources:
        limits: { memory: 256M }

  mlflow:
    profiles: ["full"]
    image: ghcr.io/mlflow/mlflow:v2.14.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db
    ports: ["5000:5000"]
    volumes: [mlflow-data:/mlflow]
    deploy:
      resources:
        limits: { memory: 384M }

  prometheus:
    profiles: ["full"]
    image: prom/prometheus:v2.53.0
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    deploy:
      resources:
        limits: { memory: 256M }

  grafana:
    profiles: ["full"]
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3001:3000"]
    depends_on: [prometheus]
    deploy:
      resources:
        limits: { memory: 256M }

volumes:
  pgdata:
  minio-data:
  mlflow-data:
