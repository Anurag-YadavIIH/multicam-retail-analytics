name: CI

on:
  push: { branches: [main] }
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - name: Install deps (backend + test)
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio ruff black numpy pyyaml opencv-python-headless==4.10.0.84
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: Pytest (unit + API, no torch needed)
        run: pytest tests/unit tests/integration --cov=backend --cov=analytics --cov=tracking --cov=vision --cov-report=term
        env:
          DATABASE_URL: sqlite:///./test.db

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v7
      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t rva-backend:ci .
      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t rva-frontend:ci frontend

  security-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v7
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
